<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga FreshCart</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .hero-app {
            text-align: center;
            padding: 60px 20px;
        }
        .phone-mockup {
            max-width: 300px;
            margin: 0 auto;
            border: 16px solid #333;
            border-top-width: 60px;
            border-bottom-width: 60px;
            border-radius: 36px;
            position: relative;
            background: white;
        }
        .phone-screen {
            width: 100%;
            height: 500px;
            background: url('https://via.placeholder.com/240x500') center/cover no-repeat;
        }
        .download-buttons img {
            max-width: 150px;
            margin: 5px;
        }
        .feature-list {
            list-style: none;
            padding: 0;
        }
        .feature-list li {
            padding: 10px 0;
            display: flex;
            align-items: center;
        }
        .feature-list li span {
            font-size: 1.5rem;
            margin-right: 10px;
        }
    </style>
</head>
<body>
<!-- add return link to index -->
<nav style="padding:1rem; background:#f0f0f0;">
    <a href="index.html" style="text-decoration:none; font-weight:bold;">&larr; Volver al inicio</a>
</nav>

    <div class="container">
        <section class="hero-app">
            <h1>Obtenga la aplicación FreshCart</h1>
            <p>Disfruta de tus compras desde tu mOVIL la mejor experiencia.</p>
            <div class="download-buttons">
                <a href="#" class="btn btn-dark mr-2" style="display:inline-flex; align-items:center;"><span class="mr-2"></span>App Store</a>
                <a href="#" class="btn btn-success" style="display:inline-flex; align-items:center;"><span class="mr-2">▶️</span>Google Play</a>
            </div>
        </section>

        <!-- hero container ended -->
    </div>

    <!-- footer with features moved down -->
    <footer class="mt-5 bg-light py-4">
        <div class="container">
            <!-- Phone mockup and registration form side by side -->
            <div class="row mb-5 align-items-center">
                <!-- Phone mockup on the left -->
                <div class="col-md-6 text-center">
                    <div class="phone-mockup">
                        <div class="phone-screen" style="background: url('https://via.placeholder.com/300x600/00FF00/000?text=Special+Offer') center/cover no-repeat;"></div>
                    </div>
                </div>
                <!-- Delivery registration form on the right -->
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title text-center mb-4">Solicita tu entrega a domicilio</h5>
                            <form>
                                <div class="row">
                                    <div class="col-sm-6 col-md-6 form-group">
                                        <label for="nombre">Nombre</label>
                                        <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
                                    </div>
                                    <div class="col-sm-6 col-md-6 form-group">
                                        <label for="email">Email</label>
                                        <input type="email" class="form-control" id="email" placeholder="tu@email.com" required>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-sm-6 col-md-6 form-group">
                                        <label for="telefono">Teléfono</label>
                                        <input type="tel" class="form-control" id="telefono" placeholder="234 567 8900" required>
                                    </div>
                                    <div class="col-sm-6 col-md-6 form-group">
                                        <label for="direccion">Dirección</label>
                                        <input type="text" class="form-control" id="direccion" placeholder="Tu dirección" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">Solicitar entrega</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Feature cards row -->
            <div class="row">
                <div class="col-sm-6 col-md-4 mb-3">
                    <button class="btn btn-outline-primary h-100 w-100 text-center py-4" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div class="mb-2" style="font-size:2rem;">🛒</div>
                        <span>Compras en 10 minutos</span>
                    </button>
                </div>
                <div class="col-sm-6 col-md-4 mb-3">
                    <button class="btn btn-outline-primary h-100 w-100 text-center py-4" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div class="mb-2" style="font-size:2rem;">🏷️</div>
                        <span>Mejores precios y ofertas</span>
                    </button>
                </div>
                <div class="col-sm-6 col-md-4 mb-3">
                    <button class="btn btn-outline-primary h-100 w-100 text-center py-4" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div class="mb-2" style="font-size:2rem;">🚚</div>
                        <span>Amplio surtido</span>
                    </button>
                </div>
                <div class="col-sm-6 col-md-4 mb-3">
                    <button class="btn btn-outline-primary h-100 w-100 text-center py-4" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div class="mb-2" style="font-size:2rem;">⭐</div>
                        <span>Promociones exclusivas</span>
                    </button>
                </div>
                <div class="col-sm-6 col-md-4 mb-3">
                    <button class="btn btn-outline-primary h-100 w-100 text-center py-4" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div class="mb-2" style="font-size:2rem;">📦</div>
                        <span>Entrega rápida</span>
                    </button>
                </div>
                <div class="col-sm-6 col-md-4 mb-3">
                    <button class="btn btn-outline-primary h-100 w-100 text-center py-4" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div class="mb-2" style="font-size:2rem;">🔔</div>
                        <span>Notificaciones útiles</span>
                    </button>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS y dependencias -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
